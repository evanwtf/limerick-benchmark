# Full model catalog for limerick-benchmark
#
# Fields:
#   id:          Ollama tag or Anthropic model ID
#   provider:    ollama | anthropic
#   size_gb:     download size (null for cloud models)
#   context_k:   context window in thousands of tokens
#   multimodal:  true if model accepts image input
#   recommended: true = in the curated top-10 benchmark set
#   poc:         true = suggested for initial POC run (fastest/smallest)
#   v1:          true = included in the v1 benchmark run
#   exclude:     reason string if this variant should be skipped
#   notes:       any other relevant info

# ---------------------------------------------------------------------------
# Reference models (Anthropic cloud) — used as scoring anchors
# ---------------------------------------------------------------------------
reference:
  - id: claude-opus-4-7
    provider: anthropic
    size_gb: null
    context_k: 200
    recommended: true
    notes: "100-point reference. Scores for all other models are relative to this."

  - id: claude-sonnet-4-6
    provider: anthropic
    size_gb: null
    context_k: 200
    recommended: true
    v1: true
    notes: "v1 reference model."

  - id: claude-haiku-4-5-20251001
    provider: anthropic
    size_gb: null
    context_k: 200
    recommended: true
    notes: "Lower-cost reference baseline."

# ---------------------------------------------------------------------------
# Gemma 4 (Google) — local via Ollama
# ---------------------------------------------------------------------------
gemma4:
  # --- e2b family (~2B active params, MoE) ---
  - id: gemma4:e2b
    provider: ollama
    size_gb: 7.2
    context_k: 128
    multimodal: true
    recommended: true
    poc: true
    v1: true
    notes: "Alias for e2b-it-q4_K_M (same hash). Smallest Gemma 4 IT variant."

  - id: gemma4:e2b-it-q4_K_M
    provider: ollama
    size_gb: 7.2
    context_k: 128
    multimodal: true
    notes: "Identical to gemma4:e2b — use that tag instead."

  - id: gemma4:e2b-it-q8_0
    provider: ollama
    size_gb: 8.1
    context_k: 128
    multimodal: true
    notes: "Higher-precision GGUF variant of e2b."

  - id: gemma4:e2b-it-bf16
    provider: ollama
    size_gb: 10.0
    context_k: 128
    multimodal: true
    notes: "Full BF16 GGUF. Useful for clean quant comparison vs e2b-mlx-bf16."

  - id: gemma4:e2b-mlx-bf16
    provider: ollama
    size_gb: 10.0
    context_k: 128
    multimodal: false
    recommended: true
    notes: "Apple MLX runtime, BF16. Same architecture as e2b-it-bf16 but different execution path — compare throughput and thermals."

  - id: gemma4:e2b-mxfp8
    provider: ollama
    size_gb: 7.9
    context_k: 128
    multimodal: false
    notes: "MX Float 8 format, MLX family."

  - id: gemma4:e2b-nvfp4
    provider: ollama
    size_gb: 7.1
    context_k: 128
    exclude: "NVIDIA FP4 format — not usable on Apple Silicon."

  # --- e4b family (~4B active params, MoE) ---
  - id: gemma4:e4b
    provider: ollama
    size_gb: 9.6
    context_k: 128
    multimodal: true
    recommended: true
    notes: "Alias for e4b-it-q4_K_M (same hash as gemma4:latest). One size up from e2b."

  - id: gemma4:latest
    provider: ollama
    size_gb: 9.6
    context_k: 128
    multimodal: true
    notes: "Identical to gemma4:e4b — use that tag instead."

  - id: gemma4:e4b-it-q4_K_M
    provider: ollama
    size_gb: 9.6
    context_k: 128
    multimodal: true
    notes: "Identical to gemma4:e4b — use that tag instead."

  - id: gemma4:e4b-it-q8_0
    provider: ollama
    size_gb: 12.0
    context_k: 128
    multimodal: true
    notes: "Higher-precision GGUF variant of e4b."

  - id: gemma4:e4b-it-bf16
    provider: ollama
    size_gb: 16.0
    context_k: 128
    multimodal: true
    notes: "Full BF16 GGUF of e4b."

  - id: gemma4:e4b-mlx-bf16
    provider: ollama
    size_gb: 16.0
    context_k: 128
    multimodal: false
    notes: "Apple MLX runtime, BF16, e4b."

  - id: gemma4:e4b-mxfp8
    provider: ollama
    size_gb: 11.0
    context_k: 128
    multimodal: false
    notes: "MX Float 8 format, e4b."

  - id: gemma4:e4b-nvfp4
    provider: ollama
    size_gb: 9.6
    context_k: 128
    exclude: "NVIDIA FP4 format — not usable on Apple Silicon."

  # --- 26b family ---
  - id: gemma4:26b
    provider: ollama
    size_gb: 18.0
    context_k: 256
    multimodal: true
    recommended: true
    v1: true
    notes: "Alias for 26b-a4b-it-q4_K_M (same hash). Large Gemma 4; big quality jump expected."

  - id: gemma4:26b-a4b-it-q4_K_M
    provider: ollama
    size_gb: 18.0
    context_k: 256
    multimodal: true
    notes: "Identical to gemma4:26b — use that tag instead."

  - id: gemma4:26b-a4b-it-q8_0
    provider: ollama
    size_gb: 28.0
    context_k: 256
    multimodal: true
    notes: "Higher-precision GGUF of 26b. Swap in if quality difference vs q4 is worth investigating."

  - id: gemma4:26b-mlx-bf16
    provider: ollama
    size_gb: 52.0
    context_k: 256
    multimodal: false
    notes: "Fits in 64 GB but tight (~12 GB headroom). Monitor for memory pressure."

  - id: gemma4:26b-mxfp8
    provider: ollama
    size_gb: 27.0
    context_k: 256
    multimodal: false
    notes: "MX Float 8, 26b. Reasonable size for quality/format comparison."

  - id: gemma4:26b-nvfp4
    provider: ollama
    size_gb: 17.0
    context_k: 256
    exclude: "NVIDIA FP4 format — not usable on Apple Silicon."

  # --- 31b family ---
  - id: gemma4:31b
    provider: ollama
    size_gb: 20.0
    context_k: 256
    multimodal: true
    notes: "Alias for 31b-it-q4_K_M (same hash). Largest practical Gemma 4 on 64 GB."

  - id: gemma4:31b-it-q4_K_M
    provider: ollama
    size_gb: 20.0
    context_k: 256
    multimodal: true
    notes: "Identical to gemma4:31b — use that tag instead."

  - id: gemma4:31b-it-q8_0
    provider: ollama
    size_gb: 34.0
    context_k: 256
    multimodal: true
    notes: "Higher-precision 31b. Leaves ~30 GB headroom — comfortable."

  - id: gemma4:31b-it-bf16
    provider: ollama
    size_gb: 63.0
    context_k: 256
    multimodal: true
    exclude: "63 GB leaves only 1 GB headroom on a 64 GB system — will likely OOM."

  - id: gemma4:31b-mlx-bf16
    provider: ollama
    size_gb: 63.0
    context_k: 256
    multimodal: false
    exclude: "63 GB leaves only 1 GB headroom on a 64 GB system — will likely OOM."

  - id: gemma4:31b-mxfp8
    provider: ollama
    size_gb: 32.0
    context_k: 256
    multimodal: false
    notes: "MX Float 8, 31b. Comfortable at 32 GB."

  - id: gemma4:31b-nvfp4
    provider: ollama
    size_gb: 20.0
    context_k: 256
    exclude: "NVIDIA FP4 format — not usable on Apple Silicon."

  - id: gemma4:31b-cloud
    provider: ollama
    size_gb: null
    exclude: "Cloud redirect — no local inference, no GPU metrics."

